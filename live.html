-1.amazonaws.com/uploads/general/images/Untitled-design---2026-03-26T154702.426_1774520237558.webp\",\"headline\":\"ಆರ್‌ಜಿ ಕರ್ ಪ್ರಕರಣದ ಕಿಚ್ಚು ಈಗ ಚುನಾವಣಾ ಅಖಾಡಕ್ಕೆ.. ಸಂತ್ರಸ್ತೆಯ ತಾಯಿಯನ್ನೇ ಕಣಕ್ಕಿಳಿಸಿದ ಬಿಜೆಪಿ! | Ratna Debnath\",\"description\":\"ಕೋಲ್ಕತ್ತಾ: ಪಶ್ಚಿಮ ಬಂಗಾಳ ಮುಖ್ಯಮಂತ್ರಿ ಮಮತಾ ಬ್ಯಾನರ್ಜಿ ನೇತೃತ್ವದ ತೃಣಮೂಲ ಕಾಂಗ್ರೆಸ್ ಸರ್ಕಾರವನ್ನು ಅಧಿಕಾರದಿಂದ ಕೆಳಗಿಳಿಸಲು ಪ್ರಯತ್ನಿಸುತ್ತಿರುವ ಬಿಜೆಪಿ, ಮುಂಬರುವ ವಿಧಾನಸಭಾ ಚುನಾವಣೆಗೆ ಅತ್ಯಂತ ಮಹತ್ವದ ರಾಜಕೀಯ ನಡೆಯೊಂದನ್ನು ಇರಿಸಿದೆ. ಇದರ ಭಾಗವಾಗಿ 2024ರಲ್ಲಿ ಇಡೀ ದೇಶವನ್ನೇ ಬೆಚ್ಚಿಬೀಳಿಸಿದ್ದ ಆರ್‌ಜಿ ಕರ್ ಪ್ರಕರಣದ ಸಂತ್ರಸ್ತೆಯ ತಾಯಿ ರತ್ನಾ ದೇಬ್ನಾಥ್​ರನ್ನು (Ratna Debnath) ನಿರೀಕ್ಷೆಯಂತೆ ತನ್ನ ಅಭ್ಯರ್ಥಿಯಾಗಿ ಘೋಷಿಸಿದೆ./\",\"category\":\"ರಾಜಕೀಯ\",\"time\":\"2026-03-26T10:17:36.001Z\",\"sectionId\":\"$undefined\",\"sectionName\":\"ನ್ಯೂಸ್\",\"sectionKey\":\"news\",\"isFeatured\":true,\"author\":\"ಮಣಿಕಂಠ ಪಿ ಹಿರೇಮಠ\",\"tags\":[],\"videoUrl\":\"\",\"isPublished\":false,\"slugName\":\"rg-kar-victims-mother-to-make-poll-debut-as-bjp-fields-her-for-bengal-elections\",\"isBreaking\":\"$undefined\",\"viewCount\":0,\"likeCount\":0,\"commentCount\":0,\"contentHtml\":\"$undefined\",\"isLiveArticle\":false,\"isActive\":true,\"isPinned\":false,\"isLocalnews\":false},{\"id\":\"69c5033ee4188b8b43556a52\",\"image\":\"https://vijayavani-bkt.s3.eu-north-1.amazonaws.com/uploads/general/images/drinks_1774519096635.webp\",\"headline\":\"ಸುಡು ಬೇಸಿಗೆಯಲ್ಲಿ ಸಿಗಲ್ವಾ 'ಚಿಲ್' ಬಿಯರ್..? ಗಾಜಿನ ಬಾಟಲಿ ಮತ್ತು ಕ್ಯಾನ್‌ಗಳ ಕೊರತೆಯಿಂದ ಮಾರುಕಟ್ಟೆಯಲ್ಲಿ ಆತಂಕ! Beer Shortage\",\"description\":\"ಪಶ್ಚಿಮ ಏಷ್ಯಾದಲ್ಲಿ ಹೆಚ್ಚುತ್ತಿರುವ ಉದ್ವಿಗ್ನತೆಯಿಂದ ಉಂಟಾಗಿರುವ ಅನಿಲದ ಕೊರತೆಯು ಗಾಜಿನ ಬಾಟಲಿಗಳ ಉತ್ಪಾದನಾ ವೆಚ್ಚವನ್ನು ಹೆಚ್ಚಿಸುತ್ತಿದೆ.\",\"category\":\"ನ್ಯೂಸ್​\",\"time\":\"2026-03-26T09:58:22.146Z\",\"sectionId\":\"$undefined\",\"sectionName\":\"ನ್ಯೂಸ್\",\"sectionKey\":\"news\",\"isFeatured\":true,\"author\":\"ಭಾನುಪ್ರಿಯ ಡಿ.ಕೆ\",\"tags\":[],\"videoUrl\":\"\",\"isPublished\":false,\"slugName\":\"india-may-face-possible-beer-shortages-as-iran-war-disrupts-glass-bottle\",\"isBreaking\":\"$undefined\",\"viewCount\":0,\"likeCount\":0,\"commentCount\":0,\"conte ಕ ಅಧ್ಯಕ್ಷ ಡೊನಾಲ್ಡ್ ಟ್ರಂಪ್(Donald Trump) ಅವರು ಇರಾನ್ ನಾಯಕರಿಗೆ ಅಂತಿಮ ಎಚ್ಚರಿಕೆ ನೀಡಿದ್ದು, ಸಂಧಾನಕ್ಕೆ ಒಪ್ಪದಿದ್ದರೆ ಭೀಕರ ಪರಿಣಾಮ ಎದುರಿಸಬೇಕಾಗುತ್ತದೆ ಎಂದು ಗುಡುಗಿದ್ದಾರೆ.\",\"category\":\"ರಾಜಕೀಯ\",\"time\":\"2026-03-26T12:23:13.493Z\",\"sectionId\":\"$undefined\",\"sectionName\":\"ನ್ಯೂಸ್\",\"sectionKey\":\"news\",\"isFeatured\":true,\"author\":\"ವಿಶ್ವಾಸ್​ ಎನ್​ ಜೋಳದಾಳು\",\"tags\":[],\"videoUrl\":\"\",\"isPublished\":false,\"slugName\":\"time-is-not-yet-ripe-be-careful-trump1-thunders-against-iran-war-clouds-loom-even-before-negotiations-donald-trump\",\"isBreaking\":\"$undefined\",\"viewCount\":0,\"likeCount\":0,\"commentCount\":0,\"contentHtml\":\"$undefined\",\"isLiveArticle\":false,\"isActive\":true,\"isPinned\":false,\"isLocalnews\":false},{\"id\":\"69c51c4f1b488b4cb543e34d\",\"image\":\"https://vijayavani-bkt.s3.eu-north-1.amazonaws.com/uploads/general/images/trump_1774525449141.webp\",\"headline\":\"ಖಾರ್ಗ್ ಮತ್ತು ಲಾರಕ್ ದ್ವೀಪಗಳ ಆಕ್ರಮಣಕ್ಕೆ ಸ್ಕೆಚ್! ಇರಾನ್‌ನ ಆರ್ಥಿಕ ಬೆನ್ನೆಲುಬು ಮುರಿಯಲು ಟ್ರಂಪ್ ಹಾಕಿದ ಮಾಸ್ಟರ್ ಪ್ಲಾನ್ ಏನು? Donald Trump\",\"description\":\"ನವದೆಹಲಿ: ಜಗತ್ತು ಮತ್ತೊಂದು ಮಹಾಯುದ್ಧದ ಹೊಸ್ತಿಲಲ್ಲಿ ನಿಂತಿದೆಯೇ ಎಂಬ ಪ್ರಶ್ನೆಗೆ ಅಮೆರಿಕ ಅಧ್ಯಕ್ಷ ಡೊನಾಲ್ಡ್ ಟ್ರಂಪ್(Donald Trump) ಅವರ ಕಠಿಣ ವಿದೇಶಾಂಗ ನೀತಿಗಳು ಉತ್ತರ ನೀಡುತ್ತೀವೆ.\",\"category\":\"ರಾಜಕೀಯ\",\"time\":\"2026-03-26T11:45:19.020Z\",\"sectionId\":\"$undefined\",\"sectionName\":\"ನ್ಯೂಸ್\",\"sectionKey\":\"news\",\"isFeatured\":true,\"author\":\"ವಿಶ್ವಾಸ್​ ಎನ್​ ಜೋಳದಾಳು\",\"tags\":[],\"videoUrl\":\"\",\"isPublished\":false,\"slugName\":\"sketch-for-the-invasion-of-kharg1-and-larak-islands-what-is-trumps-master-plan-to-break-irans-economic-backbonedonald-trump\",\"isBreaking\":\"$undefined\",\"viewCount\":0,\"likeCount\":0,\"commentCount\":0,\"contentHtml\":\"$undefined\",\"isLiveArticle\":false,\"isActive\":true,\"isPinned\":false,\"isLocalnews\":false},{\"id\":\"69c513294a127d1661e647b7\",\"image\":\"https://vijayavani-bkt.s3.eu-north-1.amazonaws.com/uploads/general/images/Owaisi_1774523059854.webp\",\"headline\":\"ಇರಾನ್ ಸುಪ್ರೀಂ ಲೀಡರ್ ಹತ್ಯೆಯಾದಾಗ ಮೌನ
